<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Excel - Picking Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 24px;
        }

        .upload-section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .upload-area {
            position: relative;
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #0f172a;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area.has-file {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            color: #64748b;
            font-size: 14px;
        }

        .upload-text .filename {
            color: #22c55e;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .status.processing {
            display: block;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(147, 197, 253, 0.3);
            border-top-color: #93c5fd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .steps {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .step.active .step-num {
            background: #3b82f6;
            color: white;
        }

        .step.done .step-num {
            background: #22c55e;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Sistema Excel</h1>
                <p>Picking Center - Procesamiento de Rutas</p>
            </div>

            <div class="steps">
                <div class="step active" id="step1">
                    <span class="step-num">1</span>
                    <span>Subir</span>
                </div>
                <div class="step" id="step2">
                    <span class="step-num">2</span>
                    <span>Procesar</span>
                </div>
                <div class="step" id="step3">
                    <span class="step-num">3</span>
                    <span>Descargar</span>
                </div>
            </div>

            <form id="uploadForm">
                <div class="upload-section">
                    <label>Archivo 1 - Programacion de Placas</label>
                    <div class="upload-area" id="area1">
                        <input type="file" name="archivo1" id="archivo1" accept=".xlsx">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text" id="text1">
                            Arrastra o haz clic para seleccionar
                        </div>
                    </div>
                </div>

                <div class="upload-section">
                    <label>Archivo 2 - Programacion PC</label>
                    <div class="upload-area" id="area2">
                        <input type="file" name="archivo2" id="archivo2" accept=".xlsx">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text" id="text2">
                            Arrastra o haz clic para seleccionar
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="btnProcesar" disabled>
                    Procesar Archivos
                </button>
            </form>

            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const archivo1 = document.getElementById('archivo1');
        const archivo2 = document.getElementById('archivo2');
        const btnProcesar = document.getElementById('btnProcesar');
        const status = document.getElementById('status');
        const form = document.getElementById('uploadForm');

        function updateFileDisplay(input, areaId, textId) {
            const area = document.getElementById(areaId);
            const text = document.getElementById(textId);
            if (input.files.length > 0) {
                area.classList.add('has-file');
                text.innerHTML = '<span class="filename">' + input.files[0].name + '</span>';
            } else {
                area.classList.remove('has-file');
                text.textContent = 'Arrastra o haz clic para seleccionar';
            }
            checkReady();
        }

        function checkReady() {
            btnProcesar.disabled = !(archivo1.files.length > 0 && archivo2.files.length > 0);
        }

        archivo1.addEventListener('change', () => updateFileDisplay(archivo1, 'area1', 'text1'));
        archivo2.addEventListener('change', () => updateFileDisplay(archivo2, 'area2', 'text2'));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Update steps
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step1').classList.add('done');
            document.getElementById('step2').classList.add('active');

            btnProcesar.disabled = true;
            btnProcesar.textContent = 'Procesando...';
            status.className = 'status processing';
            status.innerHTML = '<span class="spinner"></span> Procesando archivos, espera un momento...';

            const formData = new FormData();
            formData.append('archivo1', archivo1.files[0]);
            formData.append('archivo2', archivo2.files[0]);

            try {
                const response = await fetch('/procesar', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Error desconocido');
                }

                // Descargar archivo
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                // Obtener nombre del archivo del header
                const disposition = response.headers.get('Content-Disposition');
                let filename = 'resultado.xlsx';
                if (disposition) {
                    const match = disposition.match(/filename\*?=(?:UTF-8''|"?)([^";]+)/);
                    if (match) filename = decodeURIComponent(match[1].replace(/"/g, ''));
                }
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                // Update steps
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step2').classList.add('done');
                document.getElementById('step3').classList.add('done');

                status.className = 'status success';
                status.textContent = 'Archivo procesado y descargado correctamente.';
            } catch (err) {
                document.getElementById('step2').classList.remove('active');
                status.className = 'status error';
                status.textContent = 'Error: ' + err.message;
            }

            btnProcesar.textContent = 'Procesar Archivos';
            btnProcesar.disabled = false;
        });
    </script>
</body>
</html>
